name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  check:
    name: Lint / Typecheck / Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules for Electron
        run: pnpm exec electron-builder install-app-deps

      - name: Apply patches
        run: pnpm exec patch-package || true

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: false

      - name: Test
        run: pnpm test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-${{ matrix.os }}
          path: |
            coverage/
            **/test-results.xml
          if-no-files-found: ignore
          retention-days: 7
