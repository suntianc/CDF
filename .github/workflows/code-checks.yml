name: Code Checks

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The integration tests in src/main/deepagent/*.integration.test.ts
      # import the production `../database` module, which loads
      # better-sqlite3. prebuild-install may pick a binary built for a
      # different Node ABI than the runner's Node 22 (NODE_MODULE_VERSION
      # mismatch → ERR_DLOPEN_FAILED). Force a source build of just this
      # native module to guarantee the binary matches the runner's Node.
      - name: Rebuild better-sqlite3 against the runner's Node
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build
