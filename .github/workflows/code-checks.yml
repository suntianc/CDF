name: Code Checks

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version：自动读取 package.json 的 packageManager 字段（pnpm@11.5.1）

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The integration tests in src/main/deepagent/*.integration.test.ts
      # import the production `../database` module, which loads
      # better-sqlite3. prebuild-install may pick a binary built for a
      # different Node ABI than the runner's Node 22 (NODE_MODULE_VERSION
      # mismatch → ERR_DLOPEN_FAILED). Force a source build of just this
      # native module to guarantee the binary matches the runner's Node.
      - name: Rebuild better-sqlite3 against the runner's Node
        run: pnpm rebuild better-sqlite3

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm run build
