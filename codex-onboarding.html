<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDF — 新起点</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-app: #212121;
      --bg-sidebar: #191919;
      --bg-hover: rgba(255,255,255,0.06);
      --bg-active: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --text-primary: #ececec;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.30);
      --accent: #7c3aed;
      --accent-hover: #8b5cf6;
      --accent-dim: rgba(124, 58, 237, 0.10);
      --accent-glow: rgba(124, 58, 237, 0.12);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg-app);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w, 280px) 1fr auto;
      height: 100vh;
    }

    /* ── 拖拽调节宽度拉手 ── */
    .sidebar-resize-handle {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 20;
      background: transparent;
      transition: background 0.15s;
    }

    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.dragging {
      background: var(--accent-dim);
    }

    .sidebar-resize-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 2px;
      height: 24px;
      border-radius: 1px;
      background: var(--border);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .sidebar-resize-handle:hover::after,
    .sidebar-resize-handle.dragging::after {
      opacity: 1;
    }

    .sidebar.collapsed .sidebar-resize-handle {
      display: none;
    }

    /* ═══ Sidebar — 无痕抽屉 ═══ */
    .app {
      --sidebar-w: 280px;
    }

    .app.sidebar-collapsed {
      --sidebar-w: 0px;
    }

    .sidebar {
      width: var(--sidebar-w, 280px);
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
      position: relative;
      transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .sidebar.collapsed {
      width: 0;
    }

    .sidebar.collapsed::after { opacity: 0; }
    .sidebar.collapsed .sidebar-inner { display: none; }

    /* ── 抽屉拉手 (macOS 窗口按钮位置) ── */
    /* ── 抽屉拉手 — 固定式 (侧栏折叠时) ── */
    .drawer-handle--fixed {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 24px;
      height: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      color: var(--text-muted);
      border-radius: 50%;
      transition: color 0.15s, background 0.15s, opacity 0.25s;
      opacity: 0.4;
    }

    .drawer-handle--fixed:hover {
      opacity: 0.8;
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .drawer-handle--fixed.visible {
      display: flex;
    }

    /* ── 抽屉拉手 — 侧栏右上角 (侧栏展开时) ── */
    .drawer-handle--sidebar {
      position: absolute;
      top: 12px;
      right: 8px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      color: var(--text-muted);
      border-radius: 4px;
      transition: color 0.15s, background 0.15s, opacity 0.25s;
      opacity: 0.3;
    }

    .drawer-handle--sidebar:hover {
      opacity: 0.7;
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .drawer-handle--sidebar svg {
      width: 12px;
      height: 12px;
    }

    .sidebar.collapsed .drawer-handle--sidebar {
      display: none;
    }

    .sidebar-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar Top ── */
    .sidebar-top {
      padding: 12px 14px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-new-chat {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn-new-chat:hover {
      background: var(--bg-hover);
    }

    .btn-new-chat svg { width: 16px; height: 16px; color: var(--text-muted); }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: text;
      transition: background 0.1s;
    }

    .search-bar:hover { background: var(--bg-hover); }
    .search-bar:focus-within {
      background: var(--bg-hover);
    }

    .search-bar svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
    }

    .search-bar input::placeholder { color: var(--text-muted); }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .action-btn svg { width: 15px; height: 15px; }

    /* ── Sidebar Middle — 无痕树形列表 ── */
    .sidebar-middle {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-middle::-webkit-scrollbar { width: 4px; }
    .sidebar-middle::-webkit-scrollbar-track { background: transparent; }
    .sidebar-middle::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .tree-section { margin-bottom: 0; }

    .tree-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      position: relative;
    }

    .tree-header:hover { background: var(--bg-hover); }

    .tree-header svg.chevron {
      width: 12px;
      height: 12px;
      color: var(--text-muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .tree-section.collapsed .tree-header svg.chevron { transform: rotate(-90deg); }

    .tree-header-label {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tree-header-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 0 8px;
    }

    .tree-content {
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.15s ease;
      max-height: 800px;
      opacity: 1;
    }

    .tree-section.collapsed .tree-content {
      max-height: 0;
      opacity: 0;
    }

    .tree-empty {
      padding: 20px 16px 20px 32px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .tree-empty-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .tree-empty-inner svg {
      width: 24px;
      height: 24px;
      color: rgba(255,255,255,0.08);
    }

    .tree-empty-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .tree-empty-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.20);
    }

    /* ── Sidebar Bottom ── */
    .sidebar-bottom {
      padding: 8px 8px 10px;
      display: flex;
      gap: 2px;
    }

    .sidebar-bottom .action-btn {
      flex: 1;
      padding: 8px 6px;
      font-size: 11px;
      gap: 4px;
    }

    .sidebar-bottom .action-btn svg { width: 14px; height: 14px; }

    /* ═══ Center ═══ */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--bg-app);
      box-shadow: -1px 0 0 rgba(255,255,255,0.06);
      z-index: 1;
    }

    .center-bg-glow {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .center-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 100%;
      max-width: 680px;
      padding: 0 32px;
      position: relative;
      z-index: 1;
    }

    .center-headline {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .center-headline span {
      background: linear-gradient(135deg, var(--accent), #a855f7, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .center-subline {
      font-size: 15px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -16px;
    }

    .dialog-box {
      width: 100%;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s, box-shadow 0.2s;
      position: relative;
    }

    .dialog-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim), 0 4px 24px rgba(0,0,0,0.3);
    }

    .dialog-input {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.6;
      resize: none;
      min-height: 36px;
      max-height: 200px;
    }

    .dialog-input::placeholder { color: var(--text-muted); }

    .dialog-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .dialog-bottom-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dialog-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .dialog-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .dialog-btn.send {
      background: var(--accent);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .dialog-btn.send:hover { background: var(--accent-hover); }
    .dialog-btn.send:disabled { opacity: 0.3; cursor: not-allowed; background: var(--bg-hover); color: var(--text-muted); }
    .dialog-btn svg { width: 18px; height: 18px; }

    /* ── 模型选择器 ── */
    .model-selector {
      position: relative;
      user-select: none;
    }

    .model-selector-trigger {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.1s;
      color: var(--text-muted);
      font-size: 12px;
    }

    .model-selector-trigger:hover {
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    .model-selector-label {
      white-space: nowrap;
      font-size: 12px;
    }

    .model-chevron {
      width: 12px;
      height: 12px;
      transition: transform 0.15s;
    }

    .model-selector.open .model-chevron {
      transform: rotate(180deg);
    }

    .model-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      min-width: 220px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      overflow: hidden;
      display: none;
      z-index: 200;
    }

    .model-selector.open .model-dropdown {
      display: block;
    }

    .model-group {
      padding: 4px 0;
    }

    .model-group + .model-group {
      border-top: 1px solid var(--border);
    }

    .model-group-name {
      padding: 6px 12px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .model-select-option {
      padding: 7px 12px 7px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.1s;
    }

    .model-select-option:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .model-select-option.selected {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .dialog-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 4px;
    }

    .dialog-footer-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    .dialog-footer-hint kbd {
      font-family: var(--font-sans);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-secondary);
    }

    .dialog-footer-hint kbd {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 1px 5px;
    }

    /* ── Quick Feature Cards ── */
    .feature-rows {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-top: 4px;
    }

    .feature-card {
      flex: 1;
      padding: 14px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
    }

    .feature-card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .feature-card-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .feature-card-icon svg { width: 16px; height: 16px; color: var(--accent); }

    .feature-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .feature-card-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ═══ Right Panel (empty for new user) ═══ */
    .sidebar-right {
      width: 0;
      overflow: hidden;
      background: var(--bg-sidebar);
      transition: width 0.25s ease;
    }

    .sidebar-right.visible {
      width: 340px;
      min-width: 340px;
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 820px) {
      .sidebar { width: 260px; min-width: 260px; }
      .center-content { padding: 0 20px; }
      .center-headline { font-size: 24px; }
      .feature-rows { flex-direction: column; }
    }

    @media (max-width: 600px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        width: 280px;
      }
      .sidebar.collapsed { transform: translateX(-100%); width: 280px; }
      .center-content { padding: 0 16px; }
    }

    /* ═══ Animations ═══ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .center-content { animation: fadeUp 0.5s ease-out; }
    .btn-new-chat { animation: fadeUp 0.4s ease-out; }
    .sidebar-top > * { animation: fadeUp 0.4s ease-out both; }
    .sidebar-top > *:nth-child(2) { animation-delay: 0.05s; }
    .sidebar-top > *:nth-child(3) { animation-delay: 0.1s; }
  </style>
</head>
<body>

<div class="app">
  <!-- 抽屉拉手 — 折叠时固定在窗口左上角 -->
  <div class="drawer-handle drawer-handle--fixed" id="handle-fixed" onclick="toggleSidebar()" title="展开侧栏">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="10,4 6,8 10,12"/>
    </svg>
  </div>

  <!-- ═══ Left Sidebar — 无痕抽屉 ═══ -->
  <aside class="sidebar" id="sidebar">
    <!-- 拖拽调节宽度拉手 -->
    <div class="sidebar-resize-handle" id="sidebar-resize" title="拖拽调节宽度"></div>
    <!-- 抽屉拉手 — 展开时在抽屉右上角 -->
    <div class="drawer-handle drawer-handle--sidebar" onclick="toggleSidebar()" title="收起侧栏">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="10,4 6,8 10,12"/>
      </svg>
    </div>
    <div class="sidebar-inner">
      <!-- Top: actions -->
      <div class="sidebar-top">
        <button class="btn-new-chat" onclick="alert('新建对话')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新对话
        </button>

        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="搜索会话…" />
        </div>

        <div class="action-row">
          <button class="action-btn" title="插件管理">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M14 15H9v-5"/><path d="M20 4l-9 9"/><path d="M16 4h4v4"/>
            </svg>
            插件
          </button>
          <button class="action-btn" title="工作流管理">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v4"/><path d="M12 19v4"/>
              <path d="M4.22 4.22l2.83 2.83"/><path d="M16.95 16.95l2.83 2.83"/>
              <path d="M1 12h4"/><path d="M19 12h4"/>
              <path d="M4.22 19.78l2.83-2.83"/><path d="M16.95 7.05l2.83-2.83"/>
            </svg>
            工作流
          </button>
        </div>
      </div>

      <!-- Middle: 无痕树形列表 -->
      <div class="sidebar-middle">
        <div class="tree-section" id="tree-projects">
          <div class="tree-header" onclick="toggleTree('tree-projects')">
            <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6,5 10,8 6,11"/>
            </svg>
            <span class="tree-header-label">项目列表</span>
            <span class="tree-header-count">0</span>
          </div>
          <div class="tree-content">
            <div class="tree-empty">
              <div class="tree-empty-inner">
                <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 8h20l3 5v13a2 2 0 01-2 2H5a2 2 0 01-2-2V13l3-5z"/>
                  <line x1="3" y1="13" x2="12" y2="13"/><line x1="15" y1="13" x2="29" y2="13"/>
                  <line x1="10" y1="8" x2="10" y2="5"/><line x1="22" y1="8" x2="22" y2="5"/>
                </svg>
                <span class="tree-empty-text">暂无项目</span>
                <span class="tree-empty-hint">创建项目后显示在这里</span>
              </div>
            </div>
          </div>
        </div>

        <div class="tree-section" id="tree-chats">
          <div class="tree-header" onclick="toggleTree('tree-chats')">
            <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6,5 10,8 6,11"/>
            </svg>
            <span class="tree-header-label">对话</span>
            <span class="tree-header-count">0</span>
          </div>
          <div class="tree-content">
            <div class="tree-empty">
              <div class="tree-empty-inner">
                <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M26 6H6a3 3 0 00-3 3v12a3 3 0 003 3h5l3 5 3-5h5a3 3 0 003-3V9a3 3 0 00-3-3z"/>
                  <line x1="11" y1="14" x2="21" y2="14"/><line x1="11" y1="18" x2="17" y2="18"/>
                </svg>
                <span class="tree-empty-text">暂无对话</span>
                <span class="tree-empty-hint">智能体对话将在这里列出</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom: 设置 + 主题 -->
      <div class="sidebar-bottom">
        <button class="action-btn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          设置
        </button>
        <button class="action-btn" id="theme-toggle" title="切换主题" onclick="toggleTheme()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
          主题
        </button>
      </div>
    </div>
  </aside>

  <!-- ═══ Center ═══ -->
  <main class="center">
    <div class="center-bg-glow"></div>

    <div class="center-content">
      <h1 class="center-headline">现在让它们<span>动起来</span>？</h1>
      <p class="center-subline">选择左侧的项目或开始一个新对话，CDF 已经准备就绪</p>

      <div class="dialog-box">
        <textarea class="dialog-input" placeholder="给 CDF 下达指令，或者问点什么……" rows="1" oninput="autoResize(this)"></textarea>
        <div class="dialog-bottom">
          <div class="dialog-bottom-left">
            <button class="dialog-btn" title="添加附件">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
            <div class="model-selector" id="model-selector" onclick="toggleModelDropdown(event)">
              <div class="model-selector-trigger">
                <span class="model-selector-label">选择模型</span>
                <svg class="model-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="4,6 8,10 12,6"/>
                </svg>
              </div>
              <div class="model-dropdown" id="model-dropdown">
                <div class="model-group">
                  <div class="model-group-name">供应商 A</div>
                  <div class="model-select-option" onclick="selectModel(this, '供应商 A · Alpha')">Alpha</div>
                  <div class="model-select-option" onclick="selectModel(this, '供应商 A · Beta')">Beta</div>
                </div>
                <div class="model-group">
                  <div class="model-group-name">供应商 B</div>
                  <div class="model-select-option" onclick="selectModel(this, '供应商 B · Gamma')">Gamma</div>
                  <div class="model-select-option" onclick="selectModel(this, '供应商 B · Delta')">Delta</div>
                </div>
                <div class="model-group">
                  <div class="model-group-name">供应商 C</div>
                  <div class="model-select-option" onclick="selectModel(this, '供应商 C · Epsilon')">Epsilon</div>
                </div>
              </div>
            </div>
          </div>
          <button class="dialog-btn send" disabled title="发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="feature-rows">
        <div class="feature-card" onclick="alert('创建项目')">
          <div class="feature-card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
              <line x1="9" y1="14" x2="15" y2="14"/><line x1="12" y1="11" x2="12" y2="17"/>
            </svg>
          </div>
          <div class="feature-card-title">创建项目</div>
          <div class="feature-card-desc">导入代码仓库或新建空白项目</div>
        </div>
        <div class="feature-card" onclick="alert('配置 Skills')">
          <div class="feature-card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
          <div class="feature-card-title">配置 Skills</div>
          <div class="feature-card-desc">安装和启用智能体能力模块</div>
        </div>
        <div class="feature-card" onclick="alert('连接 MCP')">
          <div class="feature-card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/>
              <path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/>
              <line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/>
            </svg>
          </div>
          <div class="feature-card-title">连接 MCP</div>
          <div class="feature-card-desc">配置数据源和外部工具集成</div>
        </div>
      </div>

      <div class="dialog-footer">
        <span class="dialog-footer-hint">按下 <kbd>⌘K</kbd> 打开命令面板 · <kbd>Enter</kbd> 发送</span>
      </div>
    </div>
  </main>

  <!-- ═══ Right Panel (empty for new user) ═══ -->
  <aside class="sidebar-right" id="sidebar-right">
    <!-- 新用户无展示内容 -->
  </aside>
</div>

<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const app = document.querySelector('.app');
    const fixed = document.getElementById('handle-fixed');
    const collapsed = sidebar.classList.toggle('collapsed');
    app.classList.toggle('sidebar-collapsed', collapsed);
    fixed.classList.toggle('visible', collapsed);
    // 关闭模型下拉
    document.getElementById('model-selector').classList.remove('open');
  }

  // 点击外部关闭模型下拉
  document.addEventListener('click', function(e) {
    const sel = document.getElementById('model-selector');
    if (!sel.contains(e.target)) {
      sel.classList.remove('open');
    }
  });

  function toggleModelDropdown(e) {
    e.stopPropagation();
    document.getElementById('model-selector').classList.toggle('open');
  }

  function selectModel(el, label) {
    document.querySelectorAll('.model-select-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.querySelector('.model-selector-label').textContent = label;
    document.getElementById('model-selector').classList.remove('open');
  }

  function toggleTree(id) {
    document.getElementById(id).classList.toggle('collapsed');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
    const sendBtn = el.closest('.dialog-box').querySelector('.send');
    if (sendBtn) sendBtn.disabled = el.value.trim().length === 0;
  }

  let dark = true;
  function toggleTheme() {
    dark = !dark;
    const root = document.documentElement;
    if (dark) {
      root.style.setProperty('--bg-app', '#212121');
      root.style.setProperty('--bg-sidebar', '#191919');
      root.style.setProperty('--bg-hover', 'rgba(255,255,255,0.06)');
      root.style.setProperty('--bg-active', 'rgba(255,255,255,0.10)');
      root.style.setProperty('--border', 'rgba(255,255,255,0.10)');
      root.style.setProperty('--text-primary', '#ececec');
      root.style.setProperty('--text-secondary', 'rgba(255,255,255,0.55)');
      root.style.setProperty('--text-muted', 'rgba(255,255,255,0.30)');
    } else {
      root.style.setProperty('--bg-app', '#f4f4f6');
      root.style.setProperty('--bg-sidebar', '#ffffff');
      root.style.setProperty('--bg-hover', 'rgba(0,0,0,0.05)');
      root.style.setProperty('--bg-active', 'rgba(0,0,0,0.08)');
      root.style.setProperty('--border', 'rgba(0,0,0,0.08)');
      root.style.setProperty('--text-primary', '#161618');
      root.style.setProperty('--text-secondary', 'rgba(0,0,0,0.50)');
      root.style.setProperty('--text-muted', 'rgba(0,0,0,0.28)');
    }
    const icon = document.querySelector('#theme-toggle svg');
    if (icon) {
      icon.innerHTML = dark
        ? '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'
        : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }
  }

  // ─── 拖拽调节侧栏宽度 ───
  (function() {
    const handle = document.getElementById('sidebar-resize');
    const sidebar = document.getElementById('sidebar');
    const app = document.querySelector('.app');
    const MIN_W = 200;
    const MAX_W = 500;
    let startX, startW;

    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startX = e.clientX;
      startW = parseFloat(getComputedStyle(app).getPropertyValue('--sidebar-w')) || 280;
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      sidebar.style.transition = 'none';

      function onMove(ev) {
        const dx = ev.clientX - startX;
        const newW = Math.max(MIN_W, Math.min(MAX_W, startW + dx));
        app.style.setProperty('--sidebar-w', newW + 'px');
      }

      function onUp() {
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        sidebar.style.transition = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  })();

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      const activeInput = document.activeElement;
      if (activeInput && activeInput.classList.contains('dialog-input')) {
        e.preventDefault();
        const sendBtn = activeInput.closest('.dialog-box').querySelector('.send');
        if (sendBtn && !sendBtn.disabled) {
          alert('发送: ' + activeInput.value);
          activeInput.value = '';
          autoResize(activeInput);
        }
      }
    }
  });
</script>
</body>
</html>
