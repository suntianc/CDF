
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 · CDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-app: #212121;
      --bg-sidebar: #191919;
      --bg-surface: #2d2d2d;
      --bg-hover: rgba(255,255,255,0.06);
      --bg-active: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.16);
      --text-primary: #ececec;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.30);
      --accent: #7c3aed;
      --accent-hover: #8b5cf6;
      --accent-dim: rgba(124,58,237,0.12);
      --success: #22c55e;
      --success-dim: rgba(34,197,94,0.12);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.12);
      --warning: #f59e0b;
      --warning-dim: rgba(245,158,11,0.12);
      --info: #3b82f6;
      --info-dim: rgba(59,130,246,0.12);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --font-sans: 'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --font-mono: 'JetBrains Mono','SF Mono','Fira Code',monospace;
    }
    html, body { height: 100%; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; overflow: hidden; }
    .app { display: flex; height: 100vh; }
    /* ═══ Sidebar ═══ */
    .sidebar {
      width: 280px; min-width: 280px; display: flex; flex-direction: column;
      background: var(--bg-sidebar); border-right: 1px solid var(--border);
      transition: width 0.25s ease, min-width 0.25s ease; overflow: hidden;
    }
    .sidebar.collapsed { width: 0; min-width: 0; }
    .sidebar-top { padding: 14px 12px 8px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    /* Back arrow — only visible in settings mode */
    .back-btn {
      display: none; align-items: center; gap: 6px;
      padding: 6px 8px; background: transparent; border: none;
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-family: var(--font-sans); font-size: 13px; cursor: pointer;
      transition: background 0.1s, color 0.1s; margin-bottom: 4px;
    }
    .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .back-btn svg { width: 16px; height: 16px; }
    .back-btn.visible { display: flex; }
    /* ─── Chat tree (hidden in settings mode) ─── */
    .chat-tree { flex: 1; overflow-y: auto; padding: 6px 0; }
    .chat-tree::-webkit-scrollbar { width: 4px; }
    .chat-tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .tree-section { margin-bottom: 2px; }
    .tree-header { display: flex; align-items: center; gap: 4px; padding: 7px 14px; cursor: pointer; transition: background 0.1s; }
    .tree-header:hover { background: var(--bg-hover); }
    .tree-header svg.chevron { width: 11px; height: 11px; color: var(--text-muted); transition: transform 0.2s ease; flex-shrink: 0; }
    .tree-section.collapsed .tree-header svg.chevron { transform: rotate(-90deg); }
    .tree-header-label { flex: 1; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .tree-header-count { font-size: 10px; color: var(--text-muted); }
    .tree-content { overflow: hidden; transition: max-height 0.2s ease, opacity 0.15s ease; max-height: 600px; opacity: 1; }
    .tree-section.collapsed .tree-content { max-height: 0; opacity: 0; }
    .tree-item { display: flex; align-items: center; gap: 8px; padding: 6px 14px 6px 28px; cursor: pointer; transition: background 0.1s; color: var(--text-secondary); font-size: 13px; border-radius: 0; }
    .tree-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .tree-item svg { width: 14px; height: 14px; color: var(--text-muted); flex-shrink: 0; }
    .tree-item.active { background: var(--accent-dim); color: var(--accent-hover); }
    .tree-item.active svg { color: var(--accent-hover); }
    .tree-item-child { display: flex; align-items: center; gap: 6px; padding: 5px 14px 5px 44px; cursor: pointer; transition: background 0.1s; color: var(--text-secondary); font-size: 12px; }
    .tree-item-child:hover { background: var(--bg-hover); color: var(--text-primary); }
    /* ─── Settings menu (replaces chat tree in settings mode) ─── */
    .settings-menu { display: none; flex: 1; overflow-y: auto; padding: 8px 0; }
    .settings-menu::-webkit-scrollbar { width: 4px; }
    .settings-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .settings-menu.visible { display: block; }
    .settings-menu-header { padding: 8px 16px 4px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .settings-menu-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; transition: background 0.1s; color: var(--text-secondary); font-size: 13px; border-left: 2px solid transparent; }
    .settings-menu-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .settings-menu-item.active { background: var(--accent-dim); color: var(--accent-hover); border-left-color: var(--accent-hover); }
    .settings-menu-item svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .settings-menu-item.active svg { color: var(--accent-hover); }
    /* ─── Sidebar bottom ─── */
    .sidebar-bottom { padding: 8px; flex-shrink: 0; border-top: 1px solid var(--border); }
    .sidebar-bottom-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .sb-btn { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 0; background: transparent; border: none; border-radius: var(--radius-sm); color: var(--text-secondary); font-family: var(--font-sans); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .sb-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sb-btn svg { width: 14px; height: 14px; }
    .sidebar-bottom-actions.hidden { display: none; }
    /* ═══ Main Area ═══ */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-app); }
    .main-topbar { display: flex; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .topbar-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .topbar-actions { display: flex; align-items: center; gap: 6px; }
    .topbar-btn { display: flex; align-items: center; gap: 5px; padding: 6px 10px; background: transparent; border: none; border-radius: var(--radius-sm); color: var(--text-secondary); font-family: var(--font-sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .topbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .topbar-btn svg { width: 14px; height: 14px; }
    /* ═══ Settings Content Area ═══ */
    .settings-content { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .settings-content::-webkit-scrollbar { width: 6px; }
    .settings-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    /* Provider cards */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 600; color: var(--text-primary); }
    .section-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-md); font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-strong); }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: var(--danger-dim); }
    .btn svg { width: 14px; height: 14px; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .provider-list { display: flex; flex-direction: column; gap: 12px; }
    .provider-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; transition: border-color 0.15s; }
    .provider-card:hover { border-color: var(--border-strong); }
    .provider-card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .provider-meta { display: flex; align-items: center; gap: 10px; }
    .provider-icon { width: 36px; height: 36px; border-radius: var(--radius-md); background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--accent-hover); flex-shrink: 0; }
    .provider-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .provider-type { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .provider-actions { display: flex; gap: 6px; align-items: center; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
    .status-dot.offline { background: var(--text-muted); }
    .provider-models { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .models-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .model-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .model-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-family: var(--font-mono); color: var(--text-secondary); cursor: default; }
    .model-tag .remove-model { display: none; width: 12px; height: 12px; cursor: pointer; color: var(--text-muted); padding: 0; background: none; border: none; line-height: 1; }
    .model-tag:hover .remove-model { display: inline; }
    .model-tag .remove-model:hover { color: var(--danger); }
    .add-model-row { display: flex; gap: 6px; margin-top: 10px; }
    .add-model-row input { flex: 1; padding: 6px 10px; background: var(--bg-app); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: var(--font-mono); font-size: 12px; outline: none; transition: border-color 0.15s; }
    .add-model-row input:focus { border-color: var(--accent); }
    .add-model-row input::placeholder { color: var(--text-muted); }
    /* ═══ Modal ═══ */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.visible { display: flex; }
    .modal { background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: var(--radius-xl); padding: 24px; width: 480px; max-width: 90vw; }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 9px 12px; background: var(--bg-app); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-primary); font-family: var(--font-sans); font-size: 13px; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    /* ═══ Toast ═══ */
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 300; }
    .toast { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: var(--radius-md); font-size: 13px; color: var(--text-primary); box-shadow: 0 4px 16px rgba(0,0,0,0.3); animation: toastIn 0.2s ease; min-width: 200px; }
    .toast.success { border-color: rgba(34,197,94,0.4); }
    .toast.error { border-color: rgba(239,68,68,0.4); }
    .toast.info { border-color: rgba(59,130,246,0.4); }
    .toast-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .toast.success .toast-icon { color: var(--success); }
    .toast.error .toast-icon { color: var(--danger); }
    .toast.info .toast-icon { color: var(--info); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* ═══ Connection Test Spinner ═══ */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">

  <!-- ═══ Sidebar ═══ -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <!-- Back arrow — visible only in settings mode -->
      <button class="back-btn" id="backBtn" onclick="exitSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
    </div>

    <!-- Chat tree — hidden in settings mode -->
    <div class="chat-tree" id="chatTree">
      <div class="tree-section">
        <div class="tree-header" onclick="toggleSection(this)">
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span class="tree-header-label">今天</span>
          <span class="tree-header-count">3</span>
        </div>
        <div class="tree-content">
          <div class="tree-item active" onclick="selectChat(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            模型供应商配置方案
          </div>
          <div class="tree-item" onclick="selectChat(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Claude 3.7 Sonnet 架构分析
          </div>
          <div class="tree-item" onclick="selectChat(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            代码审查 — auth 模块
          </div>
        </div>
      </div>
      <div class="tree-section">
        <div class="tree-header" onclick="toggleSection(this)">
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span class="tree-header-label">昨天</span>
          <span class="tree-header-count">5</span>
        </div>
        <div class="tree-content">
          <div class="tree-item" onclick="selectChat(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            React 18 concurrent mode 调研
          </div>
          <div class="tree-item" onclick="selectChat(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            数据库 schema 讨论
          </div>
        </div>
      </div>
      <div class="tree-section collapsed">
        <div class="tree-header" onclick="toggleSection(this)">
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span class="tree-header-label">上周</span>
          <span class="tree-header-count">12</span>
        </div>
        <div class="tree-content">
          <div class="tree-item" onclick="selectChat(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>API 设计评审</div>
          <div class="tree-item" onclick="selectChat(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>性能优化方向</div>
        </div>
      </div>
    </div>

    <!-- Settings menu — replaces chat tree in settings mode -->
    <div class="settings-menu" id="settingsMenu">
      <div class="settings-menu-header">通用设置</div>
      <div class="settings-menu-item active" id="menu-provider-config" onclick="enterSettings('provider-config')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        模型供应商配置
      </div>
    </div>

    <!-- Sidebar bottom — hidden in settings mode -->
    <div class="sidebar-bottom">
      <div class="sidebar-bottom-actions" id="sidebarBottomActions">
        <button class="sb-btn" onclick="showToast('主题设置', 'info')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          主题
        </button>
        <button class="sb-btn" onclick="enterSettings('provider-config')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          设置
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ Main ═══ -->
  <div class="main">
    <div class="main-topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">模型供应商配置</div>
        <div class="topbar-subtitle" id="topbarSubtitle">管理 API 密钥和模型列表</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openAddProviderModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加供应商
        </button>
      </div>
    </div>

    <div class="settings-content">
      <div class="provider-list" id="providerList"></div>
    </div>
  </div>

</div>

<!-- Add / Edit Provider Modal -->
<div class="modal-overlay" id="providerModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">添加供应商</div>
    <input type="hidden" id="editProviderId" />
    <div class="form-group">
      <label class="form-label">供应商名称</label>
      <input class="form-input" id="providerName" placeholder="例如：OpenAI / Anthropic / 硅基流动" />
    </div>
    <div class="form-group">
      <label class="form-label">API Endpoint</label>
      <input class="form-input" id="providerEndpoint" placeholder="https://api.openai.com/v1" />
      <div class="form-hint">供应商的 API Base URL，末尾不带斜杠</div>
    </div>
    <div class="form-group">
      <label class="form-label">API Key</label>
      <input class="form-input" id="providerApiKey" type="password" placeholder="sk-…" />
    </div>
    <div class="form-group">
      <label class="form-label">供应商类型</label>
      <input class="form-input" id="providerType" placeholder="openai / anthropic / custom" />
      <div class="form-hint">用于选择合适的模型列表接口</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeProviderModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProvider()">保存</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ─── State ───
  let isSettingsMode = false;
  let editingProvider = null;

  const providers = [
    {
      id: 'p1',
      name: 'OpenAI',
      type: 'openai',
      endpoint: 'https://api.openai.com/v1',
      apiKey: 'sk-proj-••••••••',
      models: [
        { id: 'gpt-4o', name: 'GPT-4o' },
        { id: 'gpt-4o-mini', name: 'GPT-4o Mini' },
        { id: 'gpt-4.5-turbo', name: 'GPT-4.5 Turbo' },
        { id: 'gpt-3.5-turbo', name: 'GPT-3.5 Turbo' },
      ],
      connected: true,
    },
    {
      id: 'p2',
      name: 'Anthropic',
      type: 'anthropic',
      endpoint: 'https://api.anthropic.com/v1',
      apiKey: 'sk-ant-api03-••••••••',
      models: [
        { id: 'claude-sonnet-4-20250514', name: 'Claude Sonnet 4' },
        { id: 'claude-opus-4-20250514', name: 'Claude Opus 4' },
        { id: 'claude-3-5-sonnet-20241022', name: 'Claude 3.5 Sonnet' },
        { id: 'claude-3-5-haiku-20241022', name: 'Claude 3.5 Haiku' },
      ],
      connected: true,
    },
    {
      id: 'p3',
      name: '硅基流动',
      type: 'custom',
      endpoint: 'https://api.siliconflow.cn/v1',
      apiKey: 'sk-••••••••••••',
      models: [
        { id: 'Qwen/Qwen2.5-72B-Instruct', name: 'Qwen2.5-72B' },
        { id: 'deepseek-ai/DeepSeek-V2.5', name: 'DeepSeek V2.5' },
      ],
      connected: false,
    },
  ];

  // ─── Settings Mode ───
  function enterSettings(page) {
    isSettingsMode = true;
    document.getElementById('chatTree').style.display = 'none';
    document.getElementById('settingsMenu').classList.add('visible');
    document.getElementById('backBtn').classList.add('visible');
    document.getElementById('sidebarBottomActions').classList.add('hidden');
    document.getElementById('topbarTitle').textContent = '模型供应商配置';
    document.getElementById('topbarSubtitle').textContent = '管理 API 密钥和模型列表';
    document.querySelector('.topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openAddProviderModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加供应商</button>`;
    renderProviders();
  }

  function exitSettings() {
    isSettingsMode = false;
    document.getElementById('chatTree').style.display = '';
    document.getElementById('settingsMenu').classList.remove('visible');
    document.getElementById('backBtn').classList.remove('visible');
    document.getElementById('sidebarBottomActions').classList.remove('hidden');
  }

  // ─── Provider Rendering ───
  function renderProviders() {
    const list = document.getElementById('providerList');
    if (!isSettingsMode) { list.innerHTML = ''; return; }
    if (providers.length === 0) {
      list.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--text-muted);font-size:14px;">暂无供应商配置，点击右上角添加</div>`;
      return;
    }
    list.innerHTML = providers.map(p => `
      <div class="provider-card">
        <div class="provider-card-head">
          <div class="provider-meta">
            <div class="provider-icon">${p.name.charAt(0)}</div>
            <div>
              <div class="provider-name">${p.name}</div>
              <div class="provider-type">${p.type} · ${p.endpoint}</div>
            </div>
          </div>
          <div class="provider-actions">
            <span class="status-dot ${p.connected ? '' : 'offline'}" title="${p.connected ? '已连接' : '未连接'}"></span>
            <button class="btn btn-secondary btn-sm" onclick="testConnection('${p.id}')" title="测试连接">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              测试
            </button>
            <button class="btn btn-secondary btn-sm" onclick="fetchModels('${p.id}')" title="获取模型列表">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              获取模型
            </button>
            <button class="btn btn-secondary btn-sm" onclick="openEditProviderModal('${p.id}')" title="编辑">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              编辑
            </button>
            <button class="btn btn-danger btn-sm" onclick="confirmDeleteProvider('${p.id}')" title="删除">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              删除
            </button>
          </div>
        </div>
        <div class="provider-models">
          <div class="models-label">已配置模型（${p.models.length}）</div>
          <div class="model-tags">
            ${p.models.map(m => `
              <span class="model-tag">
                ${m.name}
                <button class="remove-model" onclick="removeModel('${p.id}','${m.id}')" title="移除">×</button>
              </span>
            `).join('')}
          </div>
          <div class="add-model-row">
            <input id="newModel-${p.id}" placeholder="手动填写模型 ID，例如 claude-sonnet-4-20250514" />
            <button class="btn btn-secondary btn-sm" onclick="addModel('${p.id}')">添加</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ─── Test Connection ───
  function testConnection(providerId) {
    const provider = providers.find(p => p.id === providerId);
    if (!provider) return;
    showToast(`正在连接 ${provider.name}…`, 'info');
    setTimeout(() => {
      provider.connected = true;
      renderProviders();
      showToast(`✓ ${provider.name} 连接成功`, 'success');
    }, 1500);
  }

  // ─── Fetch Models ───
  function fetchModels(providerId) {
    const provider = providers.find(p => p.id === providerId);
    if (!provider) return;
    showToast(`正在从 ${provider.name} 获取模型列表…`, 'info');
    setTimeout(() => {
      const newModels = [
        { id: `${provider.type}-model-${Date.now()}`, name: `${provider.name} Model (新增)` },
      ];
      provider.models.push(...newModels);
      renderProviders();
      showToast(`✓ 获取到 ${newModels.length} 个模型`, 'success');
    }, 1800);
  }

  // ─── Add / Edit Provider ───
  function openAddProviderModal() {
    editingProvider = null;
    document.getElementById('modalTitle').textContent = '添加供应商';
    document.getElementById('editProviderId').value = '';
    document.getElementById('providerName').value = '';
    document.getElementById('providerEndpoint').value = '';
    document.getElementById('providerApiKey').value = '';
    document.getElementById('providerType').value = '';
    document.getElementById('providerModal').classList.add('visible');
  }

  function openEditProviderModal(providerId) {
    const provider = providers.find(p => p.id === providerId);
    if (!provider) return;
    editingProvider = provider;
    document.getElementById('modalTitle').textContent = `编辑供应商 · ${provider.name}`;
    document.getElementById('editProviderId').value = provider.id;
    document.getElementById('providerName').value = provider.name;
    document.getElementById('providerEndpoint').value = provider.endpoint;
    document.getElementById('providerApiKey').value = provider.apiKey;
    document.getElementById('providerType').value = provider.type;
    document.getElementById('providerModal').classList.add('visible');
  }

  function closeProviderModal() {
    document.getElementById('providerModal').classList.remove('visible');
    editingProvider = null;
  }

  function saveProvider() {
    const name = document.getElementById('providerName').value.trim();
    const endpoint = document.getElementById('providerEndpoint').value.trim();
    const apiKey = document.getElementById('providerApiKey').value.trim();
    const type = document.getElementById('providerType').value.trim();
    if (!name || !endpoint) { showToast('请填写供应商名称和 API Endpoint', 'error'); return; }
    if (editingProvider) {
      editingProvider.name = name;
      editingProvider.endpoint = endpoint;
      editingProvider.apiKey = apiKey || editingProvider.apiKey;
      editingProvider.type = type || editingProvider.type;
      showToast(`✓ ${name} 已更新`, 'success');
    } else {
      providers.push({ id: `p${Date.now()}`, name, endpoint, apiKey: apiKey || 'sk-••••••', type: type || 'custom', models: [], connected: false });
      showToast(`✓ ${name} 已添加`, 'success');
    }
    closeProviderModal();
    renderProviders();
  }

  function confirmDeleteProvider(providerId) {
    const provider = providers.find(p => p.id === providerId);
    if (!provider) return;
    if (confirm(`确定删除供应商「${provider.name}」？此操作不可撤销。`)) {
      const idx = providers.findIndex(p => p.id === providerId);
      providers.splice(idx, 1);
      renderProviders();
      showToast(`✓ ${provider.name} 已删除`, 'success');
    }
  }

  // ─── Model Management ───
  function addModel(providerId) {
    const input = document.getElementById(`newModel-${providerId}`);
    const modelId = input.value.trim();
    if (!modelId) return;
    const provider = providers.find(p => p.id === providerId);
    if (!provider) return;
    if (provider.models.find(m => m.id === modelId)) {
      showToast('该模型 ID 已存在', 'error'); return;
    }
    provider.models.push({ id: modelId, name: modelId });
    input.value = '';
    renderProviders();
    showToast(`✓ 模型 ${modelId} 已添加`, 'success');
  }

  function removeModel(providerId, modelId) {
    const provider = providers.find(p => p.id === providerId);
    if (!provider) return;
    const idx = provider.models.findIndex(m => m.id === modelId);
    if (idx > -1) { provider.models.splice(idx, 1); renderProviders(); }
  }

  // ─── Chat Tree ───
  function toggleSection(header) {
    header.parentElement.classList.toggle('collapsed');
  }
  function selectChat(item) {
    document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
  }

  // ─── Toast ───
  function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const icons = {
      success: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      error: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
      info: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(8px)'; setTimeout(() => toast.remove(), 200); }, 3000);
  }

  // Init — enter settings mode by default for this page
  enterSettings('provider-config');
</script>
</body>
</html>
